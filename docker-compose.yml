version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cineviax-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: cineviax-backend
    environment:
      MONGO_URL: mongodb://admin:password@mongodb:27017
      DB_NAME: cineviax
      SECRET_KEY: development-secret-key-change-in-production
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cineviax-frontend
    environment:
      EXPO_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
