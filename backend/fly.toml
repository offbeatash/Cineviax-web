# fly.toml app configuration file generated for cineviax-api

app = "cineviax-api"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHON_VERSION = "3.11"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
